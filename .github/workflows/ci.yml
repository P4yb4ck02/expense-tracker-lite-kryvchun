name: CI/CD Multi-stage Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1: Test
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ExpenseTracker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Unit Tests
        # Етап завершиться помилкою, якщо хоча б один тест впаде
        run: dotnet test --no-restore --verbosity normal
  
  # Stage 2: Build
  build:
    name: Build Project and Create Artifact
    needs: test # Збірка почнеться тільки якщо тести пройшли успішно 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ExpenseTracker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Project
        run: dotnet publish -c Release -o ./publish # Реальна збірка проєкту 

      - name: Create Simulation File
        run: echo "Build version 1.0.${{ github.run_number }} ready" > ./publish/version.txt # Імітація текстового артифакта

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-app # Назва нашого артифакта 
          path: ./ExpenseTracker/publish/ # Шлях до файлів збірки 

  # Stage 3: Deploy to Staging
  deploy_staging:
    name: Deploy to Staging Environment
    needs: build # Чекаємо завершення збірки 
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-app # Завантажуємо саме той файл, що створили в Build 
          path: ./staging-app

      - name: Simulate Staging Deployment
        run: |
          echo "Deploying to Staging Server..."
          ls -R ./staging-app
          echo "Content of version.txt:"
          cat ./staging-app/version.txt
          echo "Deployment to Staging successful!" # Імітація деплою через вивід даних

  # Stage 4: Verify Staging
  verify_staging:
    name: Verify Staging (Smoke Tests)
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Run Smoke Tests Simulation
        run: |
          echo "Starting smoke tests in Staging environment..."
          # Змінюємо умову на хибну (1 не дорівнює 2)
          if [ 1 -eq 2 ]; then 
            echo "Smoke test passed"
          else
            echo "Smoke test failed!"
            exit 1 # Це змусить пайплайн зупинитися
          fi

  # Stage 5: Deploy to Production
  deploy_production:
    name: Deploy to Production
    needs: verify_staging
    runs-on: ubuntu-latest
    # Вказуємо середовище для активації Manual Approval на GitHub
    environment: production 
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: expense-tracker-app
          path: ./prod-app

      - name: Final Deploy to Production
        run: |
          echo "DEPLOYING TO PRODUCTION SERVER..."
          cat ./prod-app/version.txt
          echo "App is live at production.expensetracker.com"
